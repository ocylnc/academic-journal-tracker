name: Weekly Academic Scan

permissions:
  contents: write

on:
  schedule:
    - cron: "30 10 * * 3"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyyaml feedparser

      - name: Run journal tracker
        env:
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_RECEIVER: ${{ secrets.MAIL_RECEIVER }}
        run: python run_tracker.py

      - name: Commit results
        run: |
          git config user.name "academic-bot"
          git config user.email "bot@example.com"
          git add output/latest.html seen_items.json
          git commit -m "Weekly update" || echo "No changes"
          git push
